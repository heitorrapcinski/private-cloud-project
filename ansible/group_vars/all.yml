---
# Kolla-Ansible globals.yml
kolla_base_distro: "ubuntu"
kolla_base_distro_version: "noble"
openstack_release: "2026.1"
kolla_internal_vip_address: "10.0.100.5"
kolla_external_vip_address: "10.0.10.5"
kolla_internal_fqdn: "internal.cloud.internal"
kolla_external_fqdn: "api.cloud.internal"

# Networking
network_interface: "bond0.10"
kolla_external_vip_interface: "bond0.10"
api_interface: "bond0.100"
storage_interface: "bond0.20"
tunnel_interface: "bond1.30"
neutron_external_interface: "bond1.40"
dns_interface: "bond0.10"

# HA
enable_haproxy: "yes"
enable_keepalived: "yes"
keepalived_virtual_router_id: "51"

# Neutron
neutron_plugin_agent: "ovn"
neutron_ovn_distributed_fip: "yes"
enable_neutron_provider_networks: "yes"

# Nova
nova_compute_virt_type: "kvm"
nova_console: "novnc"
enable_nova_serialconsole_proxy: "yes"

# Storage
enable_cinder: "yes"
enable_cinder_backup: "yes"
cinder_backup_driver: "swift"
cinder_volume_group: "cinder-volumes"
enable_swift: "yes"
swift_devices_name: "KOLLA_SWIFT_DATA"
swift_hash_path_suffix: "CHANGE_ME_RANDOM_1"
swift_hash_path_prefix: "CHANGE_ME_RANDOM_2"

# Glance
glance_backend_swift: "yes"
glance_backend_file: "no"

# Services
enable_heat: "yes"
enable_horizon: "yes"
enable_octavia: "yes"
enable_barbican: "yes"
enable_designate: "yes"
enable_ironic: "yes"
enable_ceilometer: "yes"
enable_gnocchi: "yes"
enable_aodh: "yes"

# Monitoring
enable_prometheus: "yes"
enable_grafana: "yes"
enable_fluentd: "yes"

# Security
kolla_enable_tls_internal: "yes"
kolla_enable_tls_external: "yes"
kolla_certificates_dir: "/etc/kolla/certificates"
kolla_admin_openrc_cacert: "/etc/kolla/certificates/ca/root.crt"
openstack_cacert: "/etc/pki/ca-trust/source/anchors/openstack-ca.pem"

# MariaDB
enable_mariabackup: "yes"

# RabbitMQ
om_enable_rabbitmq_quorum_queues: "yes"
rabbitmq_cluster_cookie: "CHANGE_ME_CLUSTER_COOKIE"

# Memcached
memcached_max_memory: "4096"

# Logging
enable_central_logging: "yes"
