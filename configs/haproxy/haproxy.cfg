global
    log /dev/log local0
    log /dev/log local1 notice
    chroot /var/lib/haproxy
    stats socket /run/haproxy/admin.sock mode 660 level admin
    stats timeout 30s
    user haproxy
    group haproxy
    daemon
    maxconn 40000
    tune.ssl.default-dh-param 2048
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    option  http-server-close
    option  forwardfor except 127.0.0.0/8
    retries 3
    timeout http-request    10s
    timeout queue           1m
    timeout connect         5s
    timeout client          30s
    timeout server          30s
    timeout http-keep-alive 10s
    timeout check           10s
    maxconn 10000

# --- Stats ---
listen stats
    bind 10.0.10.5:1936
    mode http
    stats enable
    stats uri /haproxy?stats
    stats realm HAProxy\ Statistics
    stats auth admin:STATS_PASSWORD
    stats refresh 10s

# --- Keystone ---
frontend keystone_public
    bind 10.0.10.5:5000 ssl crt /etc/haproxy/certs/api.pem
    default_backend keystone_public_back

backend keystone_public_back
    balance roundrobin
    option httpchk GET /healthcheck
    http-check expect status 200
    server ctrl-01 10.0.100.11:5000 check inter 3s fall 3 rise 2
    server ctrl-02 10.0.100.12:5000 check inter 3s fall 3 rise 2
    server ctrl-03 10.0.100.13:5000 check inter 3s fall 3 rise 2

# --- Nova API ---
frontend nova_api
    bind 10.0.10.5:8774 ssl crt /etc/haproxy/certs/api.pem
    default_backend nova_api_back

backend nova_api_back
    balance leastconn
    option httpchk GET /
    http-check expect status 200
    server ctrl-01 10.0.100.11:8774 check inter 3s fall 3 rise 2
    server ctrl-02 10.0.100.12:8774 check inter 3s fall 3 rise 2
    server ctrl-03 10.0.100.13:8774 check inter 3s fall 3 rise 2

# --- Neutron ---
frontend neutron_api
    bind 10.0.10.5:9696 ssl crt /etc/haproxy/certs/api.pem
    default_backend neutron_api_back

backend neutron_api_back
    balance roundrobin
    option httpchk GET /
    http-check expect status 200
    server ctrl-01 10.0.100.11:9696 check inter 3s fall 3 rise 2
    server ctrl-02 10.0.100.12:9696 check inter 3s fall 3 rise 2
    server ctrl-03 10.0.100.13:9696 check inter 3s fall 3 rise 2

# --- Glance ---
frontend glance_api
    bind 10.0.10.5:9292 ssl crt /etc/haproxy/certs/api.pem
    default_backend glance_api_back

backend glance_api_back
    balance source
    option httpchk GET /healthcheck
    http-check expect status 200
    server ctrl-01 10.0.100.11:9292 check inter 3s fall 3 rise 2
    server ctrl-02 10.0.100.12:9292 check inter 3s fall 3 rise 2
    server ctrl-03 10.0.100.13:9292 check inter 3s fall 3 rise 2

# --- Cinder ---
frontend cinder_api
    bind 10.0.10.5:8776 ssl crt /etc/haproxy/certs/api.pem
    default_backend cinder_api_back

backend cinder_api_back
    balance roundrobin
    option httpchk GET /
    http-check expect status 200
    server ctrl-01 10.0.100.11:8776 check inter 3s fall 3 rise 2
    server ctrl-02 10.0.100.12:8776 check inter 3s fall 3 rise 2
    server ctrl-03 10.0.100.13:8776 check inter 3s fall 3 rise 2

# --- Horizon ---
frontend horizon
    bind 10.0.10.5:443 ssl crt /etc/haproxy/certs/api.pem
    default_backend horizon_back

backend horizon_back
    balance source
    option httpchk GET /auth/login/
    http-check expect status 200
    cookie SERVERID insert indirect nocache
    server ctrl-01 10.0.100.11:80 check inter 5s fall 3 rise 2 cookie ctrl01
    server ctrl-02 10.0.100.12:80 check inter 5s fall 3 rise 2 cookie ctrl02
    server ctrl-03 10.0.100.13:80 check inter 5s fall 3 rise 2 cookie ctrl03

# --- MariaDB Galera ---
frontend mariadb
    bind 10.0.200.5:3306
    mode tcp
    default_backend mariadb_back

backend mariadb_back
    mode tcp
    balance source
    option mysql-check user haproxy
    server db-01 10.0.200.21:3306 check inter 3s fall 3 rise 2
    server db-02 10.0.200.22:3306 check inter 3s fall 3 rise 2 backup
    server db-03 10.0.200.23:3306 check inter 3s fall 3 rise 2 backup

# --- RabbitMQ ---
frontend rabbitmq
    bind 10.0.200.6:5672
    mode tcp
    default_backend rabbitmq_back

backend rabbitmq_back
    mode tcp
    balance roundrobin
    option tcp-check
    server mq-01 10.0.200.31:5672 check inter 3s fall 3 rise 2
    server mq-02 10.0.200.32:5672 check inter 3s fall 3 rise 2
    server mq-03 10.0.200.33:5672 check inter 3s fall 3 rise 2
