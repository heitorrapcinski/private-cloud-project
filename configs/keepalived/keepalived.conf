global_defs {
    router_id LB_MASTER
    script_user root
    enable_script_security
    vrrp_garp_master_delay 5
    vrrp_garp_master_repeat 3
}

vrrp_script chk_haproxy {
    script "/usr/bin/killall -0 haproxy"
    interval 2
    weight 2
    fall 3
    rise 2
}

vrrp_instance VI_PUBLIC {
    state MASTER
    interface bond0.10
    virtual_router_id 51
    priority 101
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass KEEPALIVED_SECRET
    }
    virtual_ipaddress {
        10.0.10.5/24 dev bond0.10
    }
    track_script {
        chk_haproxy
    }
    notify_master "/etc/keepalived/notify.sh master"
    notify_backup "/etc/keepalived/notify.sh backup"
    notify_fault  "/etc/keepalived/notify.sh fault"
}

vrrp_instance VI_INTERNAL {
    state MASTER
    interface bond0.100
    virtual_router_id 52
    priority 101
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass KEEPALIVED_SECRET_2
    }
    virtual_ipaddress {
        10.0.100.5/24 dev bond0.100
    }
    track_script {
        chk_haproxy
    }
}

vrrp_instance VI_DB {
    state MASTER
    interface bond0.200
    virtual_router_id 53
    priority 101
    advert_int 1
    authentication {
        auth_type PASS
        auth_pass KEEPALIVED_SECRET_3
    }
    virtual_ipaddress {
        10.0.200.5/24 dev bond0.200
        10.0.200.6/24 dev bond0.200
    }
    track_script {
        chk_haproxy
    }
}
