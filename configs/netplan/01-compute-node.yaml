# Netplan configuration for Compute Node
# /etc/netplan/01-openstack.yaml
network:
  version: 2
  renderer: networkd

  ethernets:
    ens1f0:
      mtu: 9000
    ens1f1:
      mtu: 9000
    ens2f0:
      mtu: 9000
    ens2f1:
      mtu: 9000

  bonds:
    bond0:
      interfaces: [ens1f0, ens1f1]
      mtu: 9000
      parameters:
        mode: 802.3ad
        lacp-rate: fast
        mii-monitor-interval: 100
        transmit-hash-policy: layer3+4

    bond1:
      interfaces: [ens2f0, ens2f1]
      mtu: 9000
      parameters:
        mode: 802.3ad
        lacp-rate: fast
        mii-monitor-interval: 100
        transmit-hash-policy: layer3+4

  vlans:
    bond0.10:
      id: 10
      link: bond0
      mtu: 1500
      addresses: [10.0.10.101/24]
      routes:
        - to: default
          via: 10.0.10.1
      nameservers:
        addresses: [10.0.10.5, 8.8.8.8]

    bond0.20:
      id: 20
      link: bond0
      mtu: 9000
      addresses: [10.0.20.101/24]

    bond0.100:
      id: 100
      link: bond0
      mtu: 9000
      addresses: [10.0.100.101/24]

    bond1.30:
      id: 30
      link: bond1
      mtu: 9000
      addresses: [10.0.30.101/24]

    bond1.40:
      id: 40
      link: bond1
      mtu: 1500
