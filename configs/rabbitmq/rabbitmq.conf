# RabbitMQ Configuration
# /etc/rabbitmq/rabbitmq.conf

# Cluster
cluster_formation.peer_discovery_backend = classic_config
cluster_formation.classic_config.nodes.1 = rabbit@mq-az1fd1-01
cluster_formation.classic_config.nodes.2 = rabbit@mq-az2fd1-01
cluster_formation.classic_config.nodes.3 = rabbit@mq-az3fd1-01

# Quorum queues as default
default_queue_type = quorum

# Memory
vm_memory_high_watermark.relative = 0.6
vm_memory_high_watermark_paging_ratio = 0.8
disk_free_limit.absolute = 5GB

# Networking
tcp_listen_options.backlog = 4096
tcp_listen_options.nodelay = true
tcp_listen_options.sndbuf = 196608
tcp_listen_options.recbuf = 196608
num_acceptors.tcp = 10

# Heartbeat
heartbeat = 60

# Management
management.listener.port = 15672
management.listener.ssl = false

# Prometheus metrics
prometheus.return_per_object_metrics = true
prometheus.tcp.port = 15692

# SSL
listeners.ssl.default = 5671
ssl_options.cacertfile = /etc/rabbitmq/ssl/ca.pem
ssl_options.certfile = /etc/rabbitmq/ssl/server.pem
ssl_options.keyfile = /etc/rabbitmq/ssl/server-key.pem
ssl_options.verify = verify_peer
ssl_options.fail_if_no_peer_cert = false

# Limits
channel_max = 2048
max_message_size = 134217728

# Logging
log.console = true
log.console.level = warning
log.file = /var/log/rabbitmq/rabbit.log
log.file.level = info
log.file.rotation.size = 104857600
log.file.rotation.count = 5
